<!DOCTYPE html>
<html>
<head>
    <title>Destiny 2 Clan Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">Destiny 2 Clans</a>
  </div>
  {% if user.is_authenticated %}
    <form action="{% url 'logout' %}" method="post" style="display:inline; margin:0;">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger btn-sm">Logout</button>
    </form>
{% else %}
    <a href="/accounts/login/" class="btn btn-primary btn-sm">Login</a>
{% endif %}
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
